name: Build and Release Chipmunk2D Libraries

on:
  workflow_dispatch:
    inputs:
      chipmunk_version:
        description: 'Chipmunk2D Version (e.g., 7.0.3 or 7.0.3-patch.1 for patched)'
        required: true
        type: string
        default: '7.0.3'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Chipmunk2D
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.chipmunk_version }}"
          # Use fork only for patched versions, otherwise use original repo
          if ($v -match "patch") {
            $repo = "tguerin/Chipmunk2D"
            $tag = $v
          } else {
            $repo = "slembcke/Chipmunk2D"
            $tag = "Chipmunk-$v"
          }
          Invoke-WebRequest -Uri "https://github.com/$repo/archive/refs/tags/$tag.tar.gz" -OutFile "chipmunk2d.tar.gz"
          tar -xzf chipmunk2d.tar.gz
          $extracted = Get-ChildItem -Directory | Where-Object { $_.Name -like "Chipmunk2D-*" } | Select-Object -First 1
          Rename-Item $extracted.Name "chipmunk2d"

      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -A x64
          cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          Get-ChildItem -Path build -Filter chipmunk2d_physics_ffi.dll -Recurse | Copy-Item -Destination dist/
          cd dist
          tar -czf ../chipmunk2d_physics_ffi-windows-x64.tar.gz chipmunk2d_physics_ffi.dll

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: chipmunk2d_physics_ffi-windows-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Download Chipmunk2D
        run: |
          # Use fork only for patched versions, otherwise use original repo
          VERSION="${{ github.event.inputs.chipmunk_version }}"
          if echo "$VERSION" | grep -q "patch"; then
            REPO="tguerin/Chipmunk2D"
            TAG="$VERSION"
          else
            REPO="slembcke/Chipmunk2D"
            TAG="Chipmunk-$VERSION"
          fi
          curl -L "https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz" -o chipmunk2d.tar.gz
          tar -xzf chipmunk2d.tar.gz && mv Chipmunk2D-* chipmunk2d
      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          cmake --build build --config Release
      - name: Package
        run: |
          find build -name "*.dylib" -exec cp {} . \;
          tar -czf chipmunk2d_physics_ffi-macos-${{ matrix.arch }}.tar.gz *.dylib
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: chipmunk2d_physics_ffi-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake $( [ "${{ matrix.arch }}" = "arm64" ] && echo "gcc-aarch64-linux-gnu" )
      - name: Download Chipmunk2D
        run: |
          # Use fork only for patched versions, otherwise use original repo
          VERSION="${{ github.event.inputs.chipmunk_version }}"
          if echo "$VERSION" | grep -q "patch"; then
            REPO="tguerin/Chipmunk2D"
            TAG="$VERSION"
          else
            REPO="slembcke/Chipmunk2D"
            TAG="Chipmunk-$VERSION"
          fi
          curl -L "https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz" -o chipmunk2d.tar.gz
          tar -xzf chipmunk2d.tar.gz && mv Chipmunk2D-* chipmunk2d
      - name: Build
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          else
            cmake -B build -S src -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release
      - name: Package
        run: |
          find build -name "*.so" -exec cp {} . \;
          tar -czf chipmunk2d_physics_ffi-linux-${{ matrix.arch }}.tar.gz *.so
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: chipmunk2d_physics_ffi-linux-${{ matrix.arch }}.tar.gz

  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3
      - name: Download Chipmunk2D
        run: |
          # Use fork only for patched versions, otherwise use original repo
          VERSION="${{ github.event.inputs.chipmunk_version }}"
          if echo "$VERSION" | grep -q "patch"; then
            REPO="tguerin/Chipmunk2D"
            TAG="$VERSION"
          else
            REPO="slembcke/Chipmunk2D"
            TAG="Chipmunk-$VERSION"
          fi
          curl -L "https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz" -o chipmunk2d.tar.gz
          tar -xzf chipmunk2d.tar.gz && mv Chipmunk2D-* chipmunk2d
      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.arch }} -DCMAKE_ANDROID_NDK=$ANDROID_NDK_ROOT -DCMAKE_ANDROID_STL_TYPE=c++_static
          cmake --build build --config Release
      - name: Package
        run: |
          find build -name "*.so" -exec cp {} . \;
          tar -czf chipmunk2d_physics_ffi-android-${{ matrix.arch }}.tar.gz *.so
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: chipmunk2d_physics_ffi-android-${{ matrix.arch }}.tar.gz

  build-ios:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]
        sdk: [iphoneos, iphonesimulator]
    steps:
      - uses: actions/checkout@v4
      - name: Download Chipmunk2D
        run: |
          # Use fork only for patched versions, otherwise use original repo
          VERSION="${{ github.event.inputs.chipmunk_version }}"
          if echo "$VERSION" | grep -q "patch"; then
            REPO="tguerin/Chipmunk2D"
            TAG="$VERSION"
          else
            REPO="slembcke/Chipmunk2D"
            TAG="Chipmunk-$VERSION"
          fi
          curl -L "https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz" -o chipmunk2d.tar.gz
          tar -xzf chipmunk2d.tar.gz && mv Chipmunk2D-* chipmunk2d
      - name: Build
        run: |
          SDK_P=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} -DCMAKE_OSX_SYSROOT=$SDK_P -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          cmake --build build --config Release
      - name: Package
        run: |
          find build -name "*.dylib" -exec cp {} . \;
          tar -czf chipmunk2d_physics_ffi-ios-${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz *.dylib
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ matrix.arch }}-${{ matrix.sdk }}
          path: chipmunk2d_physics_ffi-ios-${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup WASI SDK (for pure WASM build)
        run: |
          # Download and setup WASI SDK for pure WASM compilation
          # Detect architecture - GitHub Actions runners are typically x86_64
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            WASI_ARCH="x86_64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            WASI_ARCH="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          
          WASI_SDK_VERSION=29.0
          WASI_SDK_URL="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-${WASI_SDK_VERSION}-${WASI_ARCH}-linux.tar.gz"
          echo "Downloading WASI SDK for ${WASI_ARCH} from ${WASI_SDK_URL}"
          
          wget "${WASI_SDK_URL}" -O wasi-sdk.tar.gz
          tar -xzf wasi-sdk.tar.gz
          
          # Find the extracted directory (it's named wasi-sdk-{version}-{arch}-linux)
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "wasi-sdk-*" | head -n 1)
          if [ -z "$EXTRACTED_DIR" ]; then
            echo "Error: Could not find extracted WASI SDK directory"
            exit 1
          fi
          
          # Remove leading ./ if present and get absolute path
          EXTRACTED_DIR=$(echo "$EXTRACTED_DIR" | sed 's|^\./||')
          export WASI_SDK_PATH=$(pwd)/${EXTRACTED_DIR}
          
          echo "WASI_SDK_PATH=${WASI_SDK_PATH}" >> $GITHUB_ENV
          echo "WASI SDK installed at: ${WASI_SDK_PATH}"
          
          # Verify the compiler exists
          if [ ! -f "${WASI_SDK_PATH}/bin/clang" ]; then
            echo "Error: clang not found at ${WASI_SDK_PATH}/bin/clang"
            exit 1
          fi
          
          "${WASI_SDK_PATH}/bin/clang" --version
      - name: Download Chipmunk2D
        run: |
          # Use fork only for patched versions, otherwise use original repo
          VERSION="${{ github.event.inputs.chipmunk_version }}"
          if echo "$VERSION" | grep -q "patch"; then
            REPO="tguerin/Chipmunk2D"
            TAG="$VERSION"
          else
            REPO="slembcke/Chipmunk2D"
            TAG="Chipmunk-$VERSION"
          fi
          curl -L "https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz" -o chipmunk2d.tar.gz
          tar -xzf chipmunk2d.tar.gz && mv Chipmunk2D-* chipmunk2d
      - name: Build Pure WASM
        env:
          WASI_SDK_PATH: ${{ env.WASI_SDK_PATH }}
        run: |
          # 1. Compile Chipmunk to static archive
          # We use wasm32-wasip1 as the target to match your SDK layout
          cmake -B build -S chipmunk2d \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=WASI \
            -DCMAKE_C_COMPILER="${WASI_SDK_PATH}/bin/clang" \
            -DCMAKE_C_FLAGS="--target=wasm32-wasip1 --sysroot=${WASI_SDK_PATH}/share/wasi-sysroot -fPIC" \
            -DBUILD_DEMOS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build --config Release

          # 2. Define exact paths based on your debug output
          # These are derived directly from the file listing you provided
          BUILTINS="${WASI_SDK_PATH}/lib/clang/21/lib/wasm32-unknown-wasip1/libclang_rt.builtins.a"
          SYSROOT_LIB="${WASI_SDK_PATH}/share/wasi-sysroot/lib/wasm32-wasip1"
          STATIC_LIB=$(find build -name "libchipmunk.a")

          echo "Using Builtins: $BUILTINS"
          echo "Using Sysroot Libs: $SYSROOT_LIB"

          # 3. Link into a STANDALONE binary
          # We link libc and libm to resolve standard C and math functions
          echo "Linking into standalone WASM binary..."
          "${WASI_SDK_PATH}/bin/wasm-ld" \
            -m wasm32 \
            --no-entry \
            --export-all \
            --whole-archive "$STATIC_LIB" \
            --no-whole-archive \
            -L"$SYSROOT_LIB" \
            -lc \
            -lm \
            "$BUILTINS" \
            -o chipmunk2d_physics_ffi.wasm

          # 4. Final verification
          # This will confirm we finally have a valid binary module
          file chipmunk2d_physics_ffi.wasm
      - name: Package
        run: |
          tar -czf chipmunk2d_physics_ffi-web.tar.gz chipmunk2d_physics_ffi.wasm
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: chipmunk2d_physics_ffi-web.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux, build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: prebuilt-${{ github.event.inputs.chipmunk_version }}
          name: Prebuilt Libraries for Chipmunk2D ${{ github.event.inputs.chipmunk_version }}
          body: |
            Prebuilt Chipmunk2D FFI libraries built with Chipmunk2D version ${{ github.event.inputs.chipmunk_version }}.
            
            These are prebuilt binaries for all platforms. Use tag `vX.X.X` for the library releases.
          files: all-artifacts/**/*.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}